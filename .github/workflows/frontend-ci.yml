name: Frontend CI/CD

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "frontend/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"

jobs:
  detect-frontend:
    name: Detect Frontend Scripts
    runs-on: ubuntu-latest
    outputs:
      has_package: ${{ steps.detect.outputs.has_package }}
      has_lockfile: ${{ steps.detect.outputs.has_lockfile }}
      has_lint: ${{ steps.detect.outputs.has_lint }}
      has_format_check: ${{ steps.detect.outputs.has_format_check }}
      has_test_run: ${{ steps.detect.outputs.has_test_run }}
      has_test_coverage: ${{ steps.detect.outputs.has_test_coverage }}
      has_test_e2e: ${{ steps.detect.outputs.has_test_e2e }}
      has_build: ${{ steps.detect.outputs.has_build }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect package and scripts
        id: detect
        run: |
          HAS_PACKAGE=false
          HAS_LOCKFILE=false
          HAS_LINT=false
          HAS_FORMAT_CHECK=false
          HAS_TEST_RUN=false
          HAS_TEST_COVERAGE=false
          HAS_TEST_E2E=false
          HAS_BUILD=false

          if [ -f "frontend/package.json" ]; then
            HAS_PACKAGE=true
          fi

          if [ -f "frontend/package-lock.json" ]; then
            HAS_LOCKFILE=true
          fi

          if [ "$HAS_PACKAGE" = "true" ]; then
            HAS_LINT=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path('frontend/package.json').read_text())
scripts = data.get('scripts', {}) if isinstance(data, dict) else {}
print('true' if 'lint' in scripts else 'false')
PY
)
            HAS_FORMAT_CHECK=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path('frontend/package.json').read_text())
scripts = data.get('scripts', {}) if isinstance(data, dict) else {}
print('true' if 'format:check' in scripts else 'false')
PY
)
            HAS_TEST_RUN=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path('frontend/package.json').read_text())
scripts = data.get('scripts', {}) if isinstance(data, dict) else {}
print('true' if 'test:run' in scripts else 'false')
PY
)
            HAS_TEST_COVERAGE=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path('frontend/package.json').read_text())
scripts = data.get('scripts', {}) if isinstance(data, dict) else {}
print('true' if 'test:coverage' in scripts else 'false')
PY
)
            HAS_TEST_E2E=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path('frontend/package.json').read_text())
scripts = data.get('scripts', {}) if isinstance(data, dict) else {}
print('true' if 'test:e2e' in scripts else 'false')
PY
)
            HAS_BUILD=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path('frontend/package.json').read_text())
scripts = data.get('scripts', {}) if isinstance(data, dict) else {}
print('true' if 'build' in scripts else 'false')
PY
)
          fi

          echo "has_package=$HAS_PACKAGE" >> "$GITHUB_OUTPUT"
          echo "has_lockfile=$HAS_LOCKFILE" >> "$GITHUB_OUTPUT"
          echo "has_lint=$HAS_LINT" >> "$GITHUB_OUTPUT"
          echo "has_format_check=$HAS_FORMAT_CHECK" >> "$GITHUB_OUTPUT"
          echo "has_test_run=$HAS_TEST_RUN" >> "$GITHUB_OUTPUT"
          echo "has_test_coverage=$HAS_TEST_COVERAGE" >> "$GITHUB_OUTPUT"
          echo "has_test_e2e=$HAS_TEST_E2E" >> "$GITHUB_OUTPUT"
          echo "has_build=$HAS_BUILD" >> "$GITHUB_OUTPUT"

  # 程式碼品質檢查
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: detect-frontend
    if: ${{ needs.detect-frontend.outputs.has_package == 'true' && needs.detect-frontend.outputs.has_lockfile == 'true' && needs.detect-frontend.outputs.has_lint == 'true' && needs.detect-frontend.outputs.has_format_check == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint code
        working-directory: ./frontend
        run: npm run lint

      - name: Check formatting
        working-directory: ./frontend
        run: npm run format:check

  # 單元測試
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [detect-frontend, quality]
    if: ${{ needs.detect-frontend.outputs.has_package == 'true' && needs.detect-frontend.outputs.has_lockfile == 'true' && needs.detect-frontend.outputs.has_test_run == 'true' && needs.detect-frontend.outputs.has_test_coverage == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test:run

      - name: Generate coverage report
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  # E2E 測試
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [detect-frontend, quality]
    if: ${{ needs.detect-frontend.outputs.has_package == 'true' && needs.detect-frontend.outputs.has_lockfile == 'true' && needs.detect-frontend.outputs.has_test_e2e == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./frontend
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # 建構測試
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect-frontend, test, e2e]
    if: ${{ needs.detect-frontend.outputs.has_package == 'true' && needs.detect-frontend.outputs.has_lockfile == 'true' && needs.detect-frontend.outputs.has_build == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build application
        working-directory: ./frontend
        run: npm run build

      - name: Check build size
        working-directory: ./frontend
        run: |
          MAIN_JS_SIZE=$(find dist/assets -name 'main-*.js' -exec du -k {} \; | awk '{print $1}')
          echo "Main JS size: ${MAIN_JS_SIZE}KB"
          if [ $MAIN_JS_SIZE -gt 500 ]; then
            echo "::warning::Main JS bundle is larger than 500KB"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: frontend/dist/
          retention-days: 7

  # 安全性掃描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [detect-frontend, quality]
    if: ${{ needs.detect-frontend.outputs.has_package == 'true' && needs.detect-frontend.outputs.has_lockfile == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # Docker 建構（僅在 main 分支）
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [detect-frontend, build]
    if: github.ref == 'refs/heads/main' && needs.detect-frontend.outputs.has_package == 'true' && needs.detect-frontend.outputs.has_lockfile == 'true' && needs.detect-frontend.outputs.has_build == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alleynote-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/alleynote-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 通知
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [detect-frontend, build, security]
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.security.result }}" == "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed!"
          fi
