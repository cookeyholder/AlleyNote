name: Frontend CI/CD

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "frontend/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"

jobs:
  frontend_ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect frontend toolchain
        id: detect
        run: |
          HAS_PACKAGE=false
          HAS_LOCKFILE=false
          HAS_LINT=false
          HAS_FORMAT_CHECK=false
          HAS_TEST_RUN=false
          HAS_TEST_COVERAGE=false
          HAS_TEST_E2E=false
          HAS_BUILD=false

          if [ -f "package.json" ]; then
            HAS_PACKAGE=true
          fi

          if [ -f "package-lock.json" ]; then
            HAS_LOCKFILE=true
          fi

          if [ "$HAS_PACKAGE" = "true" ]; then
            script_exists() {
              python3 -c "import json, sys; from pathlib import Path; data = json.loads(Path('package.json').read_text()); scripts = data.get('scripts', {}) if isinstance(data, dict) else {}; print('true' if sys.argv[1] in scripts else 'false')" "$1"
            }

            HAS_LINT=$(script_exists lint)
            HAS_FORMAT_CHECK=$(script_exists format:check)
            HAS_TEST_RUN=$(script_exists test:run)
            HAS_TEST_COVERAGE=$(script_exists test:coverage)
            HAS_TEST_E2E=$(script_exists test:e2e)
            HAS_BUILD=$(script_exists build)
          fi

          {
            echo "has_package=$HAS_PACKAGE"
            echo "has_lockfile=$HAS_LOCKFILE"
            echo "has_lint=$HAS_LINT"
            echo "has_format_check=$HAS_FORMAT_CHECK"
            echo "has_test_run=$HAS_TEST_RUN"
            echo "has_test_coverage=$HAS_TEST_COVERAGE"
            echo "has_test_e2e=$HAS_TEST_E2E"
            echo "has_build=$HAS_BUILD"
          } >> "$GITHUB_OUTPUT"

      - name: Skip when frontend toolchain is absent
        if: ${{ steps.detect.outputs.has_package != 'true' || steps.detect.outputs.has_lockfile != 'true' }}
        run: |
          echo "Frontend workflow triggered by frontend/ changes, but no Node.js toolchain was found."
          echo "package.json: ${{ steps.detect.outputs.has_package }}"
          echo "package-lock.json: ${{ steps.detect.outputs.has_lockfile }}"
          echo "Static frontend checks skipped by design."

      - name: Setup Node.js
        if: ${{ steps.detect.outputs.has_package == 'true' && steps.detect.outputs.has_lockfile == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: ${{ steps.detect.outputs.has_package == 'true' && steps.detect.outputs.has_lockfile == 'true' }}
        working-directory: .
        run: npm ci

      - name: Run available frontend checks
        if: ${{ steps.detect.outputs.has_package == 'true' && steps.detect.outputs.has_lockfile == 'true' }}
        working-directory: .
        run: |
          if [ "${{ steps.detect.outputs.has_lint }}" = "true" ]; then
            npm run lint
          else
            echo "Skipping lint: script not defined"
          fi

          if [ "${{ steps.detect.outputs.has_format_check }}" = "true" ]; then
            npm run format:check
          else
            echo "Skipping format check: script not defined"
          fi

          if [ "${{ steps.detect.outputs.has_test_run }}" = "true" ]; then
            npm run test:run
          else
            echo "Skipping unit tests: script not defined"
          fi

          if [ "${{ steps.detect.outputs.has_test_coverage }}" = "true" ]; then
            npm run test:coverage
          else
            echo "Skipping coverage: script not defined"
          fi

          if [ "${{ steps.detect.outputs.has_test_e2e }}" = "true" ]; then
            npx playwright install --with-deps
            npm run test:e2e
          else
            echo "Skipping frontend E2E: script not defined"
          fi

          if [ "${{ steps.detect.outputs.has_build }}" = "true" ]; then
            npm run build
          else
            echo "Skipping build: script not defined"
          fi

      - name: Upload coverage to Codecov
        if: ${{ steps.detect.outputs.has_test_coverage == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

      - name: Upload Playwright report
        if: ${{ always() && steps.detect.outputs.has_test_e2e == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload build artifacts
        if: ${{ steps.detect.outputs.has_build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
          retention-days: 7

      - name: Run npm audit
        if: ${{ steps.detect.outputs.has_package == 'true' && steps.detect.outputs.has_lockfile == 'true' }}
        working-directory: .
        run: npm audit --audit-level=moderate

      - name: Docker build
        if: ${{ github.ref == 'refs/heads/main' && steps.detect.outputs.has_build == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: alleynote-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
