name: Security Audit

permissions:
  contents: read

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每週一早上 9:00 執行
    - cron: "0 9 * * 1"

jobs:
  security-audit:
    runs-on: ubuntu-latest
    name: Security Vulnerability Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, sqlite3, json
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: backend/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: |
          cd backend
          composer install --prefer-dist --no-progress --no-interaction

      - name: Run Composer Security Audit
        run: |
          cd backend
          composer audit --format=json --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run npm Security Audit (High/Critical Gate)
        run: |
          npm audit --omit=dev --json > npm-audit.json || true
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
            const vulns = report.vulnerabilities || {};
            let high = 0;
            let critical = 0;
            for (const vuln of Object.values(vulns)) {
              if (vuln && vuln.severity === 'high') high += 1;
              if (vuln && vuln.severity === 'critical') critical += 1;
            }
            console.log('npm audit summary => high=' + high + ', critical=' + critical);
            if (high + critical > 0) {
              console.error('❌ 發現 high/critical Node.js 漏洞');
              process.exit(1);
            }
          "

      - name: Check for known security vulnerabilities
        run: |
          cd backend
          echo "=== Composer Security Audit Results ==="
          composer audit || {
            echo "❌ 發現安全漏洞！請檢查相依套件並更新至安全版本。"
            echo "執行 'composer audit' 查看詳細資訊"
            exit 1
          }
          echo "✅ 未發現已知的安全漏洞"

      - name: Create security report
        if: failure()
        run: |
          cd backend
          echo "# 安全掃描報告" > ../security-report.md
          echo "" >> ../security-report.md
          echo "## 掃描時間" >> ../security-report.md
          echo "$(date '+%Y-%m-%d %H:%M:%S')" >> ../security-report.md
          echo "" >> ../security-report.md
          echo "## PHP 相依套件漏洞" >> ../security-report.md
          composer audit --format=json | jq -r '.advisories[] | "- **\(.packageName)** (\(.affectedVersions)): \(.title)"' >> ../security-report.md || true
          echo "" >> ../security-report.md
          echo "## Node.js 相依套件漏洞" >> ../security-report.md
          cd ..
          npm audit --omit=dev --json 2>/dev/null | jq -r '.vulnerabilities | to_entries[] | "- **\(.key)** (\(.value.severity)): \(.value.title)"' >> security-report.md || true

      - name: Upload security report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
